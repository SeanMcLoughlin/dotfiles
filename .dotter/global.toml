[helpers]

[default]
depends = []

[default.files]
# Shell configurations
".zshrc" = "~/.zshrc"
".zshrc_spm" = "~/.zshrc_spm"
".bashrc_spm" = "~/.bashrc_spm"
".vimrc" = "~/.vimrc"
".vimrc_plugins" = "~/.vimrc_plugins"
".tmux.conf" = "~/.tmux.conf"
".gitconfig" = "~/.gitconfig"

# Vim directory files (individual files only, not plugged directory)
".vim/python.vim" = "~/.vim/python.vim"
".vim/rust.vim" = "~/.vim/rust.vim"
".vim/systemverilog.vim" = "~/.vim/systemverilog.vim"
".vim/yaml.vim" = "~/.vim/yaml.vim"

# Config directories (deploy entire directories recursively)
".config/fish" = { target = "~/.config/fish", type = "symbolic" }
".config/helix/config.toml" = "~/.config/helix/config.toml"
".config/helix/languages.toml" = "~/.config/helix/languages.toml"
".config/nvim" = { target = "~/.config/nvim", type = "symbolic" }

# Claude Code
".claude/settings.json" = "~/.claude/settings.json"

# Shared agent skills (symlinked from ~/.claude/skills and ~/.pi/agent/skills)
".skills" = { target = "~/.skills", type = "symbolic" }

# Pi coding agent
".config/fish/pi.fish" = "~/.config/fish/pi.fish"
".config/fish/functions/pi-find.fish" = "~/.config/fish/functions/pi-find.fish"
".config/fish/functions/pi-find-name.fish" = "~/.config/fish/functions/pi-find-name.fish"
".pi/agent/AGENTS.md" = "~/.pi/agent/AGENTS.md"
".pi/agent/keybindings.json" = "~/.pi/agent/keybindings.json"
".pi/agent/settings.json" = "~/.pi/agent/settings.json"
# Pi agents (individual files, not directory symlinks — prevents dotter --force from deleting contents)
".pi/agent/agents/planner.md" = { target = "~/.pi/agent/agents/planner.md", type = "symbolic" }
".pi/agent/agents/reviewer.md" = { target = "~/.pi/agent/agents/reviewer.md", type = "symbolic" }
".pi/agent/agents/scout.md" = { target = "~/.pi/agent/agents/scout.md", type = "symbolic" }
".pi/agent/agents/worker.md" = { target = "~/.pi/agent/agents/worker.md", type = "symbolic" }

# Pi extensions (individual file symlinks)
".pi/agent/extensions/btw/index.ts" = { target = "~/.pi/agent/extensions/btw/index.ts", type = "symbolic" }
".pi/agent/extensions/btw/lib/mode-utils.ts" = { target = "~/.pi/agent/extensions/btw/lib/mode-utils.ts", type = "symbolic" }
".pi/agent/extensions/btw/lib/subagent-core.ts" = { target = "~/.pi/agent/extensions/btw/lib/subagent-core.ts", type = "symbolic" }
".pi/agent/extensions/mac-system-theme.ts" = { target = "~/.pi/agent/extensions/mac-system-theme.ts", type = "symbolic" }
".pi/agent/extensions/read-only-mode.ts" = { target = "~/.pi/agent/extensions/read-only-mode.ts", type = "symbolic" }
".pi/agent/extensions/subagent/agents.ts" = { target = "~/.pi/agent/extensions/subagent/agents.ts", type = "symbolic" }
".pi/agent/extensions/subagent/index.ts" = { target = "~/.pi/agent/extensions/subagent/index.ts", type = "symbolic" }
".pi/agent/extensions/system-guard.ts" = { target = "~/.pi/agent/extensions/system-guard.ts", type = "symbolic" }
".pi/agent/extensions/todo.ts" = { target = "~/.pi/agent/extensions/todo.ts", type = "symbolic" }

# Pi prompt templates (individual file symlinks)
".pi/agent/prompts/implement-and-review.md" = { target = "~/.pi/agent/prompts/implement-and-review.md", type = "symbolic" }
".pi/agent/prompts/implement.md" = { target = "~/.pi/agent/prompts/implement.md", type = "symbolic" }
".pi/agent/prompts/scout-and-plan.md" = { target = "~/.pi/agent/prompts/scout-and-plan.md", type = "symbolic" }

# Worktrunk
".config/worktrunk/config.toml" = { target = "~/.config/worktrunk/config.toml", type = "symbolic" }

# Zellij
".config/zellij/config.kdl" = "~/.config/zellij/config.kdl"

# Zed editor (individual files only, not AI features)
".config/zed/settings.json" = "~/.config/zed/settings.json"
".config/zed/tasks.json" = "~/.config/zed/tasks.json"

# Hammerspoon
".hammerspoon" = { target = "~/.hammerspoon", type = "symbolic" }

[default.variables]

[settings]
default_target_type = "automatic"
